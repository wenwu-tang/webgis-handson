<!DOCTYPE html>
<html>
<head>
  <title>Chapter 12: Web-based Spatial Analysis</title>

  <script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.1/proj4.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turf/turf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ol-layerswitcher@4.1.2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol-layerswitcher@4.1.2/dist/ol-layerswitcher.css">

  <style>
    html, body {margin: 0; padding: 0; font-family: Arial, sans-serif;}
    #controls {padding: 12px;}
    #map {width: 100%;height: 600px;}
    textarea {width: 95%; margin: 12px;}
  </style>
</head>

<body>
  <h3 style="padding-left:12px;">Chapter 12: Web-based Spatial Analysis</h3>
  <h4 style="padding-left:12px;">Author: YourNameHere</h4>
  <div id="controls">
    <h4>Spatial Analysis on Client and Server Sides</h4>
    <button id="intersectBtn">Intersect Layers on Client Side</button>
    <br><br>
    <button id="serverBtn">Intersect Layers on Server Side</button>
  </div>
  <div id="map"></div>
  <div>
    <h3 style="padding-left:12px;">WPS Response:</h3>
    <textarea id="wpsResult" rows="20" cols="100"></textarea>
  </div>

  <script>
    // Register the projected CRS used by GeoServer feature data.
    proj4.defs('EPSG:26917', '+proj=utm +zone=17 +datum=NAD83 +units=m +no_defs');
    ol.proj.proj4.register(proj4);

    const osm = new ol.layer.Tile({
      title: 'OSM',
      type: 'base',
      visible: true,
      source: new ol.source.OSM()
    });

    const boundaryLayer = new ol.layer.Tile({
      title: 'Santee Experiment Forest Boundary',
      visible: true,
      source: new ol.source.TileWMS({
        url: 'http://localhost:8080/geoserver/wms',
        params: {
          'LAYERS': 'santee:sef_boundary_100ft',
          'TILED': true
        },
        serverType: 'geoserver',
        transition: 0
      })
    });

    // Layer groups for layer switcher organization.
    const baseGroup = new ol.layer.Group({
      title: 'Base maps',
      layers: [osm]
    });

    const overlayGroup = new ol.layer.Group({
      title: 'Overlays',
      layers: [boundaryLayer]
    });

    // Main OpenLayers map in geographic coordinates.
    const map = new ol.Map({
      target: 'map',
      layers: [baseGroup, overlayGroup],
      view: new ol.View({
        projection: 'EPSG:4326',
        center: [-79.795, 33.152],
        zoom: 14
      })
    });

    const layerSwitcher = new ol.control.LayerSwitcher({
      activationMode: 'click',
      startActive: false,
      tipLabel: 'Layers',
      groupSelectStyle: 'children'
    });
    map.addControl(layerSwitcher);

    // Streams source loaded from WFS as GeoJSON.
    const vectorSource = new ol.source.Vector({
      format: new ol.format.GeoJSON(),
      loader: () => {
        const url = `http://localhost:8080/geoserver/santee/ows` +
          `?service=WFS` +
          `&version=1.1.0` +
          `&request=GetFeature` +
          `&typeName=santee:sef_streams` +
          `&outputFormat=application/json` +
          `&srsname=EPSG:26917`;

        fetch(url, { method: 'GET', mode: 'cors' })
          .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
          })
          .then(data => {
            const features = new ol.format.GeoJSON().readFeatures(data, {
              dataProjection: 'EPSG:26917',
              featureProjection: 'EPSG:4326'
            });
            vectorSource.clear();
            vectorSource.addFeatures(features);
          })
          .catch(error => console.error('Error loading streams:', error));
      }
    });

    const streamLayer = new ol.layer.Vector({
      title: 'Streams',
      visible: true,
      source: vectorSource,
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({
          color: '#00FF00',
          width: 2
        })
      })
    });
    overlayGroup.getLayers().push(streamLayer);

    // Soils source loaded from WFS as GeoJSON.
    const vectorSource2 = new ol.source.Vector({
      format: new ol.format.GeoJSON(),
      loader: () => {
        const url2 = `http://localhost:8080/geoserver/santee/ows` +
          `?service=WFS` +
          `&version=1.1.0` +
          `&request=GetFeature` +
          `&typeName=santee:sef_ssurgo_soils` +
          `&outputFormat=application/json` +
          `&srsname=EPSG:26917`;

        fetch(url2, { method: 'GET', mode: 'cors' })
          .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
          })
          .then(data => {
            const features = new ol.format.GeoJSON().readFeatures(data, {
              dataProjection: 'EPSG:26917',
              featureProjection: 'EPSG:4326'
            });
            vectorSource2.clear();
            vectorSource2.addFeatures(features);
          })
          .catch(error => console.error('Error loading soils:', error));
      }
    });

    const soilLayer = new ol.layer.Vector({
      title: 'Soil',
      visible: true,
      source: vectorSource2,
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({
          color: '#ff0000',
          width: 2
        }),
        fill: new ol.style.Fill({
          color: 'rgba(255, 0, 0, 0.4)'
        })
      })
    });
    overlayGroup.getLayers().push(soilLayer);

    // Client-side Turf intersection output layer/source.
    const intersectionSource = new ol.source.Vector();
    const intersectionLayer = new ol.layer.Vector({
      title: 'Intersected Results 1',
      visible: true,
      source: intersectionSource,
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({
          color: '#34dbeb',
          width: 4
        }),
        fill: new ol.style.Fill({
          color: 'rgba(255, 255, 0, 0.4)'
        })
      })
    });
    overlayGroup.getLayers().push(intersectionLayer);

    // Server-side WPS intersection output layer/source.
    const wpsSource = new ol.source.Vector();
    const wpsLayer = new ol.layer.Vector({
      title: 'Intersected Results 2',
      visible: true,
      source: wpsSource,
      style: new ol.style.Style({
        stroke: new ol.style.Stroke({
          color: 'blue',
          width: 6
        }),
        fill: new ol.style.Fill({
          color: 'rgba(255, 0, 0, 0.5)'
        })
      })
    });
    overlayGroup.getLayers().push(wpsLayer);

    // Intersect currently loaded stream/soil features in the browser.
    function runClientSideIntersection() {
      const features1 = vectorSource2.getFeatures();
      const features2 = vectorSource.getFeatures();

      if (features1.length > 0 && features2.length > 0) {
        intersectionSource.clear();

        const geojson1 = new ol.format.GeoJSON().writeFeaturesObject(features1);
        const geojson2 = new ol.format.GeoJSON().writeFeaturesObject(features2);

        geojson1.features.forEach((feature1) => {
          geojson2.features.forEach((feature2) => {
            try {
              const intersection = turf.intersect(feature1, feature2);
              if (intersection) {
                const intersectFeature = new ol.format.GeoJSON().readFeature(intersection);
                intersectionSource.addFeature(intersectFeature);
              }
            } catch (e) {
              console.warn('Client-side intersection failed for a feature pair:', e);
            }
          });
        });
      } else {
        alert('One or both layers have no features loaded.');
      }
    }

    document.getElementById('intersectBtn').addEventListener('click', runClientSideIntersection);

    function buildWPSRequest(layerRef1, layerRef2) {
      return `
      <wps:Execute version="1.0.0" service="WPS"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xmlns="http://www.opengis.net/wps/1.0.0"
        xmlns:wps="http://www.opengis.net/wps/1.0.0"
        xmlns:ows="http://www.opengis.net/ows/1.1"
        xmlns:xlink="http://www.w3.org/1999/xlink"
        xsi:schemaLocation="http://www.opengis.net/wps/1.0.0 http://schemas.opengis.net/wps/1.0.0/wpsAll.xsd">
        <ows:Identifier>gs:IntersectionFeatureCollection</ows:Identifier>
        <wps:DataInputs>
          <wps:Input>
            <ows:Identifier>first feature collection</ows:Identifier>
            <wps:Reference
              mimeType="text/xml; subtype=wfs-collection/1.0"
              xlink:href="${layerRef1}"
              method="GET" />
          </wps:Input>
          <wps:Input>
            <ows:Identifier>second feature collection</ows:Identifier>
            <wps:Reference
              mimeType="text/xml; subtype=wfs-collection/1.0"
              xlink:href="${layerRef2}"
              method="GET" />
          </wps:Input>
          <wps:Input>
            <ows:Identifier>intersectionMode</ows:Identifier>
            <wps:Data>
              <wps:LiteralData>INTERSECTION</wps:LiteralData>
            </wps:Data>
          </wps:Input>
        </wps:DataInputs>
        <wps:ResponseForm>
          <wps:RawDataOutput mimeType="text/xml; subtype=wfs-collection/1.0">
            <ows:Identifier>result</ows:Identifier>
          </wps:RawDataOutput>
        </wps:ResponseForm>
      </wps:Execute>`;
    }

    // Run server-side intersection in GeoServer WPS and draw returned features.
    function sendWPSRequest(wpsRequest) {
      // Submit WPS Execute request to GeoServer OWS endpoint.
      fetch('http://localhost:8080/geoserver/ows', {
        method: 'POST',
        mode: 'cors',
        headers: {
          'Content-Type': 'application/xml'
        },
        body: wpsRequest
      })
      // Read raw XML text so it can be shown and parsed by OpenLayers formats.
      .then(response => response.text())
      .then(result => {
        // Echo server response in the textarea for troubleshooting.
        document.getElementById('wpsResult').value = result;
        console.log('WPS raw response:', result);

        // Try parsers in sequence because output can vary by GeoServer config.
        let features = [];
        try {
          // Preferred parser when output is a WFS feature collection document.
          features = new ol.format.WFS().readFeatures(result, {
            dataProjection: 'EPSG:26917',
            featureProjection: 'EPSG:4326'
          });
          console.log('Parsed with WFS:', features.length);
        } catch (e) {
          console.warn('WFS parser failed:', e);
        }

        if (!features || features.length === 0) {
          alert('WPS succeeded but no readable features were parsed.'); return;
        }

        // Refresh features in the existing server-side result layer.
        wpsSource.clear();
        wpsSource.addFeatures(features);
      })
      .catch(error => {
        // Network/CORS/endpoint failures are handled here.
        console.error('WPS Error:', error);
        alert('WPS request failed. Check console.');
      });
    }

    // Build WPS XML payload, then execute server-side intersection.
    function runServerSideIntersection() {
      // WFS references passed to WPS as feature collections.
      const streamsRef = `http://localhost:8080/geoserver/santee/ows` +
        `?service=WFS` +
        `&version=1.0.0` +
        `&request=GetFeature` +
        `&typeName=santee:sef_streams` +
        `&outputFormat=GML2`;
      const soilsRef = `http://localhost:8080/geoserver/santee/ows` +
        `?service=WFS` +
        `&version=1.0.0` +
        `&request=GetFeature` +
        `&typeName=santee:sef_ssurgo_soils` +
        `&outputFormat=GML2`;
      // Escape query separators for safe embedding inside XML attributes.
      const streamsRefXml = streamsRef.replace(/&/g, '&amp;');
      const soilsRefXml = soilsRef.replace(/&/g, '&amp;');

      const wpsRequest = buildWPSRequest(streamsRefXml, soilsRefXml);

      sendWPSRequest(wpsRequest);
    }
    document.getElementById('serverBtn').addEventListener('click', runServerSideIntersection);
  </script>
</body>
</html>
