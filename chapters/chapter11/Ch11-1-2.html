<html> 
<head> 
 <title>Chapter 11: Web-based Query</title>
	<script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>    
	<script src="https://rawgit.com/walkermatt/ol-layerswitcher/master/dist/ol-layerswitcher.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.1/proj4.js"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css">
	<link rel="stylesheet" href="https://rawgit.com/walkermatt/ol-layerswitcher/master/src/ol-layerswitcher.css"/>
    <link rel="stylesheet" href="https://rawgit.com/walkermatt/ol-layerswitcher/master/examples/layerswitcher.css" />
</head> 

<body> 
<h3>Chapter 11: Web-based Query</h3> 
<h4>Author: YourNameHere</h4> 

<div id="controls">
	<h4> Non-spatial Query </h4>
    <label for="cqlInput1">CQL Query for streams:</label>
    <input type="text" id="cqlInput1" value="LENGTH > 200">
    <button id="applyCQL1">Apply CQL</button>
	<br>
	<label for="cqlInput2">CQL Query for soil:</label>
    <input type="text" id="cqlInput2" value="MUSYM = 'Wa'">
    <button id="applyCQL2">Apply CQL</button>
</div>

<div id="map" class="map", style = "width:100%; height: 100%"></div> 

<script type="text/javascript">
		// Register the EPSG:26917 projection with proj4
        proj4.defs('EPSG:26917', '+proj=utm +zone=17 +datum=NAD83 +units=m +no_defs');
        ol.proj.proj4.register(proj4);
		
		var OSM = new ol.layer.Tile({ 
			title: 'OSM', 
			type: 'base', 
			visible: true, 
			source: new ol.source.OSM() 
		}); 

		var wms1 = new ol.layer.Tile({ 
			title: 'Santee Experiment Forest Boundary', 
			visible: true, 
			projection: 'EPSG:4326',
			source: new ol.source.TileWMS({ 
			url: 'http://jade.uncc.edu:8080/geoserver/wms', 
			params: {'LAYERS': 'wenwu:sef_boundary_100ft', 'TILED': true}, 
			serverType: 'geoserver', 
			transition: 0 
			}) 
		}); 
		var group = new ol.layer.Group({ 
			'title': 'Base maps', 
			layers: [OSM] 
		}); 
		 
		var map = new ol.Map({ 
			target: 'map', 
			layers: [group,wms1], 
			view: new ol.View({ 
				projection: 'EPSG:4326',
				center:  [-79.795,33.152],
				zoom: 14
			}) 
		});
		 
		var layerSwitcher = new ol.control.LayerSwitcher({ 
			tipLabel: 'Legend' // Optional label for button 
		}); 
		  
		map.addControl(layerSwitcher); 
 		
		       // Define the vector source with dynamic CQL support
        const vectorSource = new ol.source.Vector({
            format: new ol.format.GeoJSON(),
            loader: () => {
                const cqlFilter = encodeURIComponent(document.getElementById('cqlInput1').value);
				console.log('Applying CQL Filter:', cqlFilter);
                const url = `http://jade.uncc.edu:8080/geoserver/wenwu/ows?service=WFS
					&version=1.1.0
					&request=GetFeature
					&typename=wenwu:sef_streams
					&outputFormat=application/json
					&srsname=EPSG:26917
					&CQL_FILTER=${cqlFilter}`;

				console.log("Fetching WFS URL:", url); // Add this line to check the URL
                fetch(url,{
					method: 'GET',
					mode: 'cors',
				})
				.then(response => {
					if (!response.ok) throw new Error('Network response was not ok');
					return response.json();
				})
				.then(data => {
					const features = new ol.format.GeoJSON().readFeatures(data, {
						dataProjection: 'EPSG:26917', // Data's original projection
						featureProjection: 'EPSG:4326' // Map's projection
					});
					vectorSource.clear();
					vectorSource.addFeatures(features);
				})
				.catch(error => console.error('Error loading data:', error));
            }
        });

        // Define the vector layer
        const vectorLayer = new ol.layer.Vector({
			title: 'Streams',
            source: vectorSource,
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: '#00FF00',
                    width: 2
                })
            })
        });
        map.addLayer(vectorLayer);
		
		  // Define the vector source with dynamic CQL support
        const vectorSource2 = new ol.source.Vector({
            format: new ol.format.GeoJSON(),
            loader: () => {
                const cqlFilter2 = encodeURIComponent(document.getElementById('cqlInput2').value);
				console.log('Applying CQL Filter:', cqlFilter2);
                const url2 = `http://jade.uncc.edu:8080/geoserver/wenwu/ows?service=WFS
				&version=1.1.0
				&request=GetFeature
				&typename=wenwu:sef_ssurgo_soils
				&outputFormat=application/json
				&srsname=EPSG:26917
				&CQL_FILTER=${cqlFilter2}`;

				console.log("Fetching WFS URL:", url2); // Add this line to check the URL
                fetch(url2,{
					method: 'GET',
					mode: 'cors',
				})
				.then(response => {
					if (!response.ok) throw new Error('Network response was not ok');
					return response.json();
				})
				.then(data => {
					const features = new ol.format.GeoJSON().readFeatures(data, {
						dataProjection: 'EPSG:26917', // Data's original projection
						featureProjection: 'EPSG:4326' // Map's projection
					});
					vectorSource2.clear();
					vectorSource2.addFeatures(features);
				})
				.catch(error => console.error('Error loading data:', error));
            }
        });

        // Define the vector layer
        const vectorLayer2 = new ol.layer.Vector({
			title: 'Soil',
            source: vectorSource2,
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: '#ff0000',
                    width: 2,
                }),
                fill: new ol.style.Fill({
                    color: 'rgba(255, 0, 0, 0.4)',
                }),
            }),
        });
        map.addLayer(vectorLayer2);
		

        // Apply the CQL filter on button click event
        document.getElementById('applyCQL1').addEventListener('click', () => {
            vectorSource.clear(); // Clear previous features
        	vectorSource.refresh();
        });

        document.getElementById('applyCQL2').addEventListener('click', () => {
            vectorSource2.clear(); // Clear previous features
        	vectorSource2.refresh();
        });
 </script> 
 </body> 
</html>
