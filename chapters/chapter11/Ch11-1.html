<html> 
<head> 
 <title>Chapter 11: Web-based Query and Online Geoprocessing</title>
	<script src="https://cdn.jsdelivr.net/npm/ol@v10.3.1/dist/ol.js"></script>    
	<script src="https://rawgit.com/walkermatt/ol-layerswitcher/master/dist/ol-layerswitcher.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.1/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ol/proj/proj4.js"></script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v10.3.1/ol.css">
	<link rel="stylesheet" href="https://rawgit.com/walkermatt/ol-layerswitcher/master/src/ol-layerswitcher.css"/>
    <link rel="stylesheet" href="https://rawgit.com/walkermatt/ol-layerswitcher/master/examples/layerswitcher.css" />
</head> 

<body> 
<h3>Chapter 11: Web-based Query and Online Geoprocessing</h3> 
<h4>Author: YourNameHere</h4> 

<div id="map" class="map", style = "width:100%; height: 100%"></div> 

<script type="text/javascript">
		// Register the EPSG:26917 projection with proj4
        proj4.defs('EPSG:26917', '+proj=utm +zone=17 +datum=NAD83 +units=m +no_defs');
        ol.proj.proj4.register(proj4);
		
		var OSM = new ol.layer.Tile({ 
			title: 'OSM', 
			type: 'base', 
			visible: true, 
			source: new ol.source.OSM() 
		}); 

		var wms1 = new ol.layer.Tile({ 
			title: 'Santee Experiment Forest Boundary', 
			visible: true, 
			projection: 'EPSG:4326',
			source: new ol.source.TileWMS({ 
			url: 'http://jade.uncc.edu:8080/geoserver/wms', 
			params: {'LAYERS': 'wenwu:sef_boundary_100ft', 'TILED': true}, 
			serverType: 'geoserver', 
			transition: 0 
			}) 
		}); 
		var group = new ol.layer.Group({ 
			'title': 'Base maps', 
			layers: [OSM] 
		}); 
		 
		var map = new ol.Map({ 
			target: 'map', 
			layers: [group,wms1], 
			view: new ol.View({ 
				projection: 'EPSG:4326',
				center:  [-79.795,33.152],
				zoom: 14
			}) 
		});
		 
		var layerSwitcher = new ol.control.LayerSwitcher({ 
			tipLabel: 'Legend' // Optional label for button 
		}); 
		  
		map.addControl(layerSwitcher); 
 		
 </script> 
 </body> 
</html>
