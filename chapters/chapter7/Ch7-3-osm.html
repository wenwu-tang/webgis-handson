<html>
<head>
    <title>Chapter 7:Web-based Mapping Using Leaflet </title>
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
	 
	  <!-- Make sure you put this AFTER Leaflet's CSS -->
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
</head>
  
<body>
	<h3>Chapter 7: Web-based Mapping Using Leaflet</h3>
	<h4>Author: YOUR NAME HERE</h4>
    <div id="map" class="map", style = "width:100%; height: 100%"></div>
	<script>
	//based on https://leafletjs.com/examples/quick-start/
	var latlng=[35.306840,-80.73200];
	var zoomLevel=3;
	var map = L.map('map').setView(latlng, zoomLevel);
	L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);
</script>

</body>
</html>
