<!DOCTYPE html>
<html>
<head>
  <title>North Carolina Counties WebGIS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>
  <h3 style="text-align:center;">North Carolina Counties Web Map</h3>
  <div id="map" style="height:90vh; width:100%;"></div>
  <script>
    const map = L.map("map").setView([35.5, -79.5], 7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);
    fetch("/api/counties")
      .then(res => res.json())
      .then(data => {
        console.log("GeoJSON features:", data.features.length);
        const layer = L.geoJSON(data, {
          style: {
            color: "#0074D9",
            weight: 1,
            fillColor: "#7FDBFF",
            fillOpacity: 0.3
          },
          onEachFeature: (feature, layer) => {
            layer.bindPopup(`<b>${feature.properties.County || "Unnamed County"}</b>`);
          }
        }).addTo(map);
        map.fitBounds(layer.getBounds()); // zoom to layer extent
      })
      .catch(err => console.error("Error loading GeoJSON:", err));
  </script>
</body>
</html>
