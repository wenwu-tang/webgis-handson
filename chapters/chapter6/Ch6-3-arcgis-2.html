<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body, #mapContainer { height: 100%; margin: 0; }
  </style>

  <script type="module">
    import Map from "https://js.arcgis.com/5.0/@arcgis/core/Map.js";
    import MapView from "https://js.arcgis.com/5.0/@arcgis/core/views/MapView.js";
    import GeoJSONLayer from "https://js.arcgis.com/5.0/@arcgis/core/layers/GeoJSONLayer.js";
    import Graphic from "https://js.arcgis.com/5.0/@arcgis/core/Graphic.js";

    const center = [-98.5, 39.8];

    const map = new Map({ basemap: "topo-vector" });

    const view = new MapView({
      container: "mapContainer",
      map: map,
      center: center,
      zoom: 4
    });

    view.when(() => {
      view.graphics.add(new Graphic({
        geometry: { type: "point", longitude: center[0], latitude: center[1] },
        symbol: { type: "simple-marker", color: "red" }
      }));
    });

  </script>
</head>
<body>
  <h1> Chapter 6: Client-side Mapping via APIs </h1>
  <h3>Name: YOUR NAME HERE</h3>
  <!-- Comments-->
  <div id="mapContainer"</div>
</body>
</html>
