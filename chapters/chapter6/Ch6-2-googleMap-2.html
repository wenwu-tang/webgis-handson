<script type="text/javascript">
  function loadMap() 
  {
    var mapCenter = {lat:39.8,lng: -98.5};
    var mapParameters = {
      zoom: 3,
      center: mapCenter,
      mapTypeId: google.maps.MapTypeId.HYBRID
    };
    var map = new google.maps.Map(
        document.getElementById("mapContainer"),
        mapParameters
    );
  }
</script>
